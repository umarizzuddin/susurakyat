<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Susu Rakyat</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:system-ui,-apple-system,sans-serif;background:#f1f5f9;color:#1e293b}
  .wrap{max-width:960px;margin:0 auto;padding-bottom:90px}
  header{background:var(--hijau);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:30}
  header .logo{width:34px;height:34px;background:#fff;color:var(--hijau);border-radius:10px;display:grid;place-items:center;font-weight:800}
  header b{font-size:17px}
  .pad{padding:0 16px}
  h2{font-size:18px;margin:14px 16px 8px}
  nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e2e8f0;display:grid;grid-template-columns:repeat(5,1fr);z-index:30}
  nav button{border:none;background:none;padding:8px 0;font-size:11px;color:#94a3b8;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
  nav button .i{font-size:18px}
  nav button.on{color:var(--hijau);font-weight:600}
  .card{background:#fff;border-radius:16px;padding:14px;margin:0 16px 10px}
  .stat{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 16px}
  @media(min-width:600px){.stat{grid-template-columns:repeat(4,1fr)}}
  .stat .b{background:#fff;border-radius:14px;padding:12px}
  .stat .l{font-size:12px;color:#64748b}
  .stat .v{font-size:17px;font-weight:800;margin-top:2px}
  .kat{display:flex;gap:8px;overflow-x:auto;padding:10px 16px}
  .kat button{padding:6px 14px;border:none;border-radius:999px;background:#fff;color:#475569;font-size:13px;white-space:nowrap;cursor:pointer}
  .kat button.on{background:var(--hijau);color:#fff}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 16px}
  @media(min-width:600px){.grid{grid-template-columns:repeat(3,1fr)}}
  .prod{background:#fff;border-radius:16px;padding:12px;cursor:pointer;border:2px solid transparent;transition:.12s}
  .prod:active{border-color:var(--hijau)}
  .prod.off{opacity:.45}
  .prod .ikon{aspect-ratio:1;border-radius:12px;background:linear-gradient(135deg,#d1fae5,#dbeafe);display:grid;place-items:center;font-size:32px;margin-bottom:8px}
  .prod .nm{font-weight:600;font-size:14px;line-height:1.2}
  .prod .hg{color:var(--hijau);font-weight:700;font-size:14px;margin-top:2px}
  .prod .st{font-size:11px;margin-top:2px}
  input,select,textarea{padding:9px;border:1px solid #e2e8f0;border-radius:10px;font-size:14px;width:100%;font-family:inherit;background:#fff}
  label{font-size:12px;color:#64748b;display:block;margin-bottom:8px}
  label span{display:block;margin-bottom:3px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .btn{padding:12px;border:none;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;width:100%}
  .btn-h{background:var(--hijau);color:#fff}
  .btn-b{background:var(--biru);color:#fff}
  .btn-g{background:#f1f5f9;color:#475569}
  .btn-sm{padding:7px 12px;font-size:13px;width:auto;border-radius:10px}
  .btn:disabled{background:#cbd5e1;color:#fff}
  .keranjang{position:fixed;bottom:56px;left:0;right:0;background:#fff;border-top:1px solid #e2e8f0;padding:12px 16px;max-height:62vh;overflow:auto;z-index:20;max-width:960px;margin:0 auto}
  .baris{display:flex;justify-content:space-between;align-items:center;font-size:14px;padding:5px 0}
  .qbtn{width:26px;height:26px;border:none;border-radius:8px;background:#f1f5f9;font-size:16px;cursor:pointer}
  .qbtn.plus{background:#d1fae5;color:#059669}
  .total{font-size:20px;font-weight:800;color:var(--hijau)}
  .kosong{text-align:center;color:#94a3b8;padding:16px;font-size:14px}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:grid;place-items:center;padding:16px;z-index:50}
  .sheet{background:#fff;border-radius:18px;padding:18px;width:100%;max-width:360px;max-height:88vh;overflow:auto}
  .chip{padding:7px 12px;border-radius:999px;border:1px solid #e2e8f0;background:#fff;font-size:13px;cursor:pointer}
  .chip.on{background:var(--biru);color:#fff;border-color:var(--biru)}
  .uk{padding:12px;border:2px solid #e2e8f0;border-radius:12px;cursor:pointer;text-align:left}
  .uk.on{border-color:var(--hijau);background:#ecfdf5}
  .chart{display:flex;align-items:flex-end;gap:6px;height:120px;margin-top:8px}
  .chart .bar{width:100%;background:var(--hijau);border-radius:6px 6px 0 0;min-height:3px}
  .chart .lbl{font-size:9px;color:#94a3b8;text-align:center;margin-top:4px}
  .alert{background:#fffbeb;border:1px solid #fde68a;color:#b45309;border-radius:14px;padding:12px;margin:0 16px 10px;font-size:13px}
  .tag{font-size:11px;padding:2px 8px;border-radius:999px;background:#eff6ff;color:#2563eb}
  .ico-btn{width:30px;height:30px;border:none;border-radius:9px;display:grid;place-items:center;cursor:pointer;font-size:14px}
</style>
</head>

/* ---------- DASHBOARD ---------- */
function viewDashboard(){
  const now=new Date(), hari=now.toDateString();
  const mingguLalu=new Date(now);mingguLalu.setDate(now.getDate()-6);
  let pHari=0,pMinggu=0,pBulan=0,nHari=0,laba=0;
  const perProduk={},perJam=Array(24).fill(0),per7=[];
  for(const t of transaksi){
    const d=new Date(t.waktu);
    if(d.toDateString()===hari){pHari+=t.total;nHari++;}
    if(d>=mingguLalu)pMinggu+=t.total;
    if(d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()){pBulan+=t.total;laba+=t.laba;perJam[d.getHours()]+=t.total;}
    for(const it of t.items)perProduk[it.nama]=(perProduk[it.nama]||0)+it.qty;
  }
  const terlaris=Object.entries(perProduk).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const jamRamai=perJam.indexOf(Math.max(...perJam));
  for(let i=6;i>=0;i--){const d=new Date(now);d.setDate(now.getDate()-i);
    const tot=transaksi.filter(t=>new Date(t.waktu).toDateString()===d.toDateString()).reduce((s,t)=>s+t.total,0);
    per7.push({lbl:d.toLocaleDateString("id-ID",{weekday:"short"}),tot});}
  const maxBar=Math.max(1,...per7.map(x=>x.tot));
  const tipis=produk.filter(p=>p.stok>0&&p.stok<=p.minStok);
  const habis=produk.filter(p=>p.stok<=0);

  return `<h2>Dashboard</h2>
  <div class="stat">
    ${stat("Hari ini",rp(pHari))}${stat("Minggu ini",rp(pMinggu))}
    ${stat("Bulan ini",rp(pBulan))}${stat("Transaksi hari ini",nHari)}
  </div>
  <div class="stat" style="margin-top:10px">
    ${stat("Laba bersih (bln ini)",rp(laba))}${stat("Terlaris",terlaris[0]?terlaris[0][0]:"-")}
    ${stat("Jam ramai",String(jamRamai).padStart(2,"0")+".00")}${stat("Perlu stok",(tipis.length+habis.length)+" item")}
  </div>
  <div class="card"><b style="font-size:14px">Penjualan 7 hari terakhir</b>
    <div class="chart">${per7.map(x=>`<div style="flex:1"><div class="bar" style="height:${Math.round(x.tot/maxBar*110)}px"></div><div class="lbl">${x.lbl}</div></div>`).join("")}</div>
  </div>
  <div class="card"><b style="font-size:14px">Produk paling laku</b>
    ${terlaris.length?terlaris.map((t,i)=>`<div class="baris"><span>${i+1}. ${t[0]}</span><b>${t[1]} terjual</b></div>`).join(""):`<div class="kosong">Belum ada penjualan</div>`}
  </div>
  ${(tipis.length||habis.length)?`<div class="alert"><b>\u26A0\uFE0F Peringatan stok</b><br>${habis.map(p=>p.nama+" (habis)").concat(tipis.map(p=>p.nama+" (sisa "+p.stok+")")).join(", ")}</div>`:""}`;
}
const stat=(l,v)=>`<div class="b"><div class="l">${l}</div><div class="v">${v}</div></div>`;

  <div class="grid" id="gridProduk">${gridProduk("")}</div>`;
}
function gridProduk(cari){
  const list=produk.filter(p=>p.aktif&&(katAktif==="Semua"||p.kategori===katAktif)&&p.nama.toLowerCase().includes(cari.toLowerCase()));
  if(!list.length)return `<div class="kosong" style="grid-column:1/-1">Produk tidak ditemukan</div>`;
  return list.map(p=>{const off=p.stok<=0;
    return `<div class="prod ${off?'off':''}" ${off?'':`onclick="bukaVarian('${p.id}')"`}>
      <div class="ikon">${p.foto?`<img src="${p.foto}" style="width:100%;height:100%;object-fit:cover;border-radius:12px">`:(p.ikon||"\u{1F964}")}</div><div class="nm">${p.nama}</div><div class="hg">${rp(p.harga)}</div>
      <div class="st" style="color:${off?'#ef4444':p.stok<=p.minStok?'#d97706':'#94a3b8'}">${off?'Habis':'Stok '+p.stok}</div>
    </div>`;}).join("");
}
function setKat(c){katAktif=c;const cari=document.getElementById("cari").value;
  document.querySelectorAll("#katBar button").forEach(b=>b.classList.toggle("on",b.textContent===c));

let varianProduk=null, varianUkuran=0, varianTop=[];
function bukaVarian(id){varianProduk=produk.find(p=>p.id===id);varianUkuran=0;varianTop=[];gambarVarian();}
function gambarVarian(){
  const p=varianProduk;const hg=p.harga+UKURAN[varianUkuran].tambah+varianTop.reduce((s,i)=>s+TOPPING[i].harga,0);
  modal(`<b>${p.nama}</b>
    <div style="font-size:13px;color:#64748b;margin:10px 0 6px">Ukuran</div>
    <div class="row2">${UKURAN.map((u,i)=>`<div class="uk ${varianUkuran===i?'on':''}" onclick="pilihUk(${i})"><b>${u.nama}</b><div style="font-size:11px;color:#94a3b8">${u.label} \u00B7 ${rp(p.harga+u.tambah)}</div></div>`).join("")}</div>
    <div style="font-size:13px;color:#64748b;margin:12px 0 6px">Topping (harga nambah otomatis)</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px">${TOPPING.map((t,i)=>`<div class="chip ${varianTop.includes(i)?'on':''}" onclick="toggleTop(${i})">${t.nama} +${rp(t.harga)}</div>`).join("")}</div>
    <div class="row2" style="margin-top:16px">
      <button class="btn btn-g" onclick="tutupModal()">Batal</button>
      <button class="btn btn-h" onclick="tambahKeranjang()">Tambah \u00B7 ${rp(hg)}</button>
    </div>`);
}
function pilihUk(i){varianUkuran=i;gambarVarian();}
function toggleTop(i){varianTop.includes(i)?varianTop=varianTop.filter(x=>x!==i):varianTop.push(i);gambarVarian();}
function tambahKeranjang(){
  const p=varianProduk,u=UKURAN[varianUkuran];
  const tops=varianTop.map(i=>TOPPING[i]);
  const harga=p.harga+u.tambah+tops.reduce((s,t)=>s+t.harga,0);
  const sig=p.id+"-"+u.nama+"-"+varianTop.slice().sort().join(",");
  const ada=keranjang.find(x=>x.sig===sig);
  if(ada)ada.qty++;
  else keranjang.push({sig,produkId:p.id,nama:p.nama,ukuran:u.nama,toppings:tops.map(t=>t.nama),harga,modal:p.modal,qty:1});
  tutupModal();gambarKeranjang();
}
function ubahQty(i,d){keranjang[i].qty+=d;if(keranjang[i].qty<=0)keranjang.splice(i,1);gambarKeranjang();}

let diskonNom=0,diskonPersen=0,pajak=0,catatan="";
function hitung(){
  const sub=keranjang.reduce((s,x)=>s+x.harga*x.qty,0);
  const pot=sub*(Number(diskonPersen)||0)/100;
  const dpp=Math.max(0,sub-pot-(Number(diskonNom)||0));
  const pjk=dpp*(Number(pajak)||0)/100;
  return {sub,pot,dpp,pjk,total:dpp+pjk};
}
function gambarKeranjang(){
  const box=document.getElementById("keranjang");
  if(halaman!=="kasir"){box.style.display="none";return;}
  box.style.display="block";
  if(!keranjang.length){box.innerHTML=`<div class="kosong">Keranjang kosong \u2014 ketuk produk untuk menambah</div>`;return;}
  const h=hitung();
  box.innerHTML=keranjang.map((x,i)=>`<div class="baris">
      <span style="flex:1"><b>${x.nama}</b> <span style="color:#94a3b8;font-size:12px">${x.ukuran}${x.toppings.length?" \u00B7 "+x.toppings.join(","):""}</span></span>
      <span style="display:flex;gap:6px;align-items:center">${rp(x.harga*x.qty)}
        <button class="qbtn" onclick="ubahQty(${i},-1)">\u2212</button><b>${x.qty}</b><button class="qbtn plus" onclick="ubahQty(${i},1)">+</button></span>
    </div>`).join("")
    +`<input placeholder="Catatan pesanan (opsional)" style="margin:8px 0" value="${catatan}" oninput="catatan=this.value">
      <div class="row2"><input type="number" placeholder="Diskon Rp" value="${diskonNom||''}" oninput="diskonNom=this.value;refKer()">
      <input type="number" placeholder="Diskon %" value="${diskonPersen||''}" oninput="diskonPersen=this.value;refKer()"></div>
      <input type="number" placeholder="Pajak %" style="margin-top:8px" value="${pajak||''}" oninput="pajak=this.value;refKer()">
      <select id="metode" style="margin-top:8px">${METODE.map(m=>`<option>${m}</option>`).join("")}</select>
      <div class="baris" style="margin-top:6px"><b>Total</b><span class="total">${rp(h.total)}</span></div>
      <button class="btn btn-h" onclick="bayar()">Bayar ${rp(h.total)}</button>`;
}
function refKer(){const h=hitung();const b=document.querySelector("#keranjang .total");if(b)b.textContent=rp(h.total);
  const btn=document.querySelector("#keranjang .btn-h");if(btn)btn.textContent="Bayar "+rp(h.total);}

function bayar(){
  if(!keranjang.length)return;
  const h=hitung();const metode=document.getElementById("metode").value;
  const labaItem=keranjang.reduce((s,x)=>s+(x.harga-x.modal)*x.qty,0);
  const laba=labaItem-h.pot-(Number(diskonNom)||0);
  const trx={id:"TRX"+Date.now().toString().slice(-7),waktu:new Date().toISOString(),
    items:keranjang.map(x=>({...x})),catatan,subtotal:h.sub,diskonNom:Number(diskonNom)||0,diskonPersen:Number(diskonPersen)||0,pajak:h.pjk,total:h.total,laba,metode};
  transaksi.unshift(trx);simpanTrx();
  produk=produk.map(p=>{const jual=keranjang.filter(x=>x.produkId===p.id).reduce((s,x)=>s+x.qty,0);return jual?{...p,stok:Math.max(0,p.stok-jual)}:p;});
  simpanProduk();bunyi();strukModal(trx);
  keranjang=[];diskonNom=0;diskonPersen=0;pajak=0;catatan="";gambarKeranjang();
}
function strukModal(t){
  modal(`<div style="text-align:center"><div style="font-size:42px">\u2705</div><b>Pembayaran berhasil</b>
    <div style="font-size:12px;color:#94a3b8">${t.metode} \u00B7 ${t.id}</div></div>
    <div style="border-top:1px dashed #cbd5e1;margin:12px 0;padding-top:10px;font-size:13px">
      ${t.items.map(x=>`<div class="baris" style="padding:2px 0"><span>${x.qty}\u00D7 ${x.nama} <span style="color:#94a3b8">${x.ukuran}</span></span><span>${rp(x.harga*x.qty)}</span></div>`).join("")}
      <div class="baris" style="border-top:1px dashed #cbd5e1;margin-top:6px;padding-top:6px"><b>Total</b><b>${rp(t.total)}</b></div>
    </div>
    <div class="row2"><button class="btn btn-g" onclick="kirimWA('${t.id}')">\u{1F4F2} Kirim WA</button>
    <button class="btn btn-h" onclick="tutupModal()">Selesai</button></div>`);

function kirimWA(id){
  const t=transaksi.find(x=>x.id===id);if(!t)return;
  let txt=`*${TOKO}*%0AStruk ${t.id}%0A`;
  t.items.forEach(x=>txt+=`${x.qty}x ${x.nama} (${x.ukuran}) - ${rp(x.harga*x.qty)}%0A`);
  txt+=`*Total: ${rp(t.total)}*%0ABayar: ${t.metode}%0ATerima kasih \u{1F64F}`;
  window.open("https://wa.me/?text="+txt,"_blank");
}

    </div>
    <div class="row2" style="margin-top:8px"><button class="btn btn-g" onclick="tutupModal()">Batal</button>
    <button class="btn btn-h" onclick="simpanForm('${id}')">Simpan</button></div>`);

// Pilih & kecilkan foto agar muat di penyimpanan
let fotoBaru=null;
function pilihFoto(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const max=400;let w=img.width,h=img.height;
      if(w>h){if(w>max){h=h*max/w;w=max;}}else{if(h>max){w=w*max/h;h=max;}}
      const cv=document.createElement("canvas");cv.width=w;cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      fotoBaru=cv.toDataURL("image/jpeg",0.7);
      document.getElementById("fotoPrev").innerHTML=`<img src="${fotoBaru}" style="width:100%;height:100%;object-fit:cover">`;
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
function simpanForm(id){
  const g=x=>document.getElementById(x);
  const data={nama:g("fNama").value.trim(),kategori:g("fKat").value.trim()||"Lainnya",
    harga:+g("fHarga").value||0,modal:+g("fModal").value||0,stok:+g("fStok").value||0,
    minStok:+g("fMin").value||0,ikon:g("fIkon").value||"\u{1F964}",foto:fotoBaru,aktif:g("fAktif").checked};
  if(!data.nama){alert("Nama produk wajib diisi");return;}
  try{
    if(id)produk=produk.map(p=>p.id===id?{...p,...data}:p);
    else produk.push({id:uid(),...data});
    simpanProduk();
  }catch(e){alert("Penyimpanan penuh. Coba pakai foto lebih sedikit/lebih kecil.");return;}
  tutupModal();render();
}
function hapusProduk(id){if(confirm("Hapus produk ini?")){produk=produk.filter(p=>p.id!==id);simpanProduk();render();}}

  return `<h2>Manajemen Stok</h2>
  ${produk.map(p=>`<div class="card" style="display:flex;justify-content:space-between;align-items:center">
    <div><b>${p.nama}</b>
      <div style="font-size:13px;margin-top:3px;color:${p.stok<=0?'#ef4444':p.stok<=p.minStok?'#d97706':'#16a34a'}">
        ${p.stok<=0?'HABIS':'Stok: '+p.stok} ${p.stok>0&&p.stok<=p.minStok?'(menipis)':''}</div></div>
    <button class="btn btn-b btn-sm" onclick="stokMasuk('${p.id}')">+ Stok masuk</button>
  </div>`).join("")}`;
}
function stokMasuk(id){
  const p=produk.find(x=>x.id===id);
  const n=prompt("Tambah stok untuk "+p.nama+" (jumlah):","10");
  if(n===null)return;const j=parseInt(n);if(isNaN(j))return;
  produk=produk.map(x=>x.id===id?{...x,stok:x.stok+j}:x);simpanProduk();render();
}

/* ---------- LAPORAN ---------- */
let rangeLap="hari";
function viewLaporan(){
  const now=new Date();let start=new Date(now);
  if(rangeLap==="hari")start.setHours(0,0,0,0);
  if(rangeLap==="minggu")start.setDate(now.getDate()-6);
  if(rangeLap==="bulan"){start.setDate(1);start.setHours(0,0,0,0);}
  const f=transaksi.filter(t=>new Date(t.waktu)>=start);
  const pemasukan=f.reduce((s,t)=>s+t.total,0);
  const laba=f.reduce((s,t)=>s+t.laba,0);
  const perMetode={};f.forEach(t=>perMetode[t.metode]=(perMetode[t.metode]||0)+t.total);
  return `<h2>Laporan Keuangan</h2>
  <div class="kat" style="padding-top:0">${[["hari","Harian"],["minggu","Mingguan"],["bulan","Bulanan"]].map(([id,l])=>`<button class="${rangeLap===id?'on':''}" onclick="setRange('${id}')">${l}</button>`).join("")}</div>
  <div class="stat">${stat("Pemasukan",rp(pemasukan))}${stat("Modal (HPP)",rp(pemasukan-laba))}${stat("Laba bersih",rp(laba))}${stat("Transaksi",f.length)}</div>
  <div class="card"><b style="font-size:14px">Per metode bayar</b>
    ${Object.keys(perMetode).length?Object.entries(perMetode).map(([m,v])=>`<div class="baris"><span>${m}</span><b>${rp(v)}</b></div>`).join(""):`<div class="kosong">Belum ada data</div>`}</div>
  <div class="pad"><button class="btn btn-g" onclick="exportCSV()">\u2B07\uFE0F Export CSV (buka di Excel)</button></div>
  <div class="card" style="background:#f8fafc"><b style="font-size:14px">Cadangkan data</b>
    <div style="font-size:12px;color:#64748b;margin:6px 0 10px">Simpan atau pindahkan semua data ke perangkat lain.</div>
    <div class="row2"><button class="btn btn-g" onclick="backup()">\u{1F4BE} Backup</button>
    <button class="btn btn-g" onclick="document.getElementById('restoreFile').click()">\u{1F4C2} Restore</button></div>
    <input type="file" id="restoreFile" accept=".json" style="display:none" onchange="restore(this)"></div>`;
}
function setRange(r){rangeLap=r;render();}
function exportCSV(){
  const rows=[["ID","Waktu","Items","Total","Laba","Metode"]];
  transaksi.forEach(t=>rows.push([t.id,new Date(t.waktu).toLocaleString("id-ID"),t.items.map(x=>x.qty+"x "+x.nama).join("; "),t.total,Math.round(t.laba),t.metode]));
  const csv=rows.map(r=>r.map(c=>`"${c}"`).join(",")).join("\n");
  unduh(new Blob([csv],{type:"text/csv"}),"laporan-"+TOKO+".csv");
}
function backup(){unduh(new Blob([JSON.stringify({produk,transaksi})],{type:"application/json"}),"backup-"+TOKO+".json");}
function restore(inp){
  const file=inp.files[0];if(!file)return;const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);if(d.produk){produk=d.produk;simpanProduk();}if(d.transaksi){transaksi=d.transaksi;simpanTrx();}alert("Data berhasil dipulihkan");render();}catch(e){alert("File tidak valid");}};
  r.readAsText(file);
}
function unduh(blob,nama){const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=nama;a.click();}

/* ---------- util ---------- */
function modal(html){document.getElementById("modalArea").innerHTML=`<div class="modal" onclick="if(event.target===this)tutupModal()"><div class="sheet">${html}</div></div>`;}
function tutupModal(){document.getElementById("modalArea").innerHTML="";}
function bunyi(){try{const c=new(window.AudioContext||window.webkitAudioContext)();[880,1175].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.frequency.value=f;o.connect(g);g.connect(c.destination);const t=c.currentTime+i*0.14;g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(0.25,t+0.02);g.gain.exponentialRampToValueAtTime(0.0001,t+0.13);o.start(t);o.stop(t+0.14);});}catch(e){}}

render();
</script>
